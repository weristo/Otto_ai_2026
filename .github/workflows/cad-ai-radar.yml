name: CAD AI SaaS Radar

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

concurrency:
  group: cad-ai-radar
  cancel-in-progress: true

jobs:
  scan-and-email:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      REPORT_TO: ${{ secrets.CAD_REPORT_TO }}
      REPORT_FROM: ${{ secrets.CAD_REPORT_FROM }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      TZ: Europe/Berlin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate required secrets
        shell: bash
        run: |
          [ -n "${RESEND_API_KEY}" ] || { echo "Missing secret: RESEND_API_KEY"; exit 1; }
          [ -n "${REPORT_TO}" ] || { echo "Missing secret: CAD_REPORT_TO"; exit 1; }
          [ -n "${REPORT_FROM}" ] || { echo "Missing secret: CAD_REPORT_FROM"; exit 1; }
          echo "::add-mask::${RESEND_API_KEY}"

      - name: Build hourly report
        shell: bash
        run: |
          python scripts/cad_ai_radar.py --output cad_report_payload.json --limit 20

      - name: Send email via Resend
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          with open("cad_report_payload.json", "r", encoding="utf-8") as f:
              payload = json.load(f)

          data = {
              "from": os.environ["REPORT_FROM"],
              "to": [os.environ["REPORT_TO"]],
              "subject": payload["subject"],
              "html": payload["html"],
          }
          raw = json.dumps(data).encode("utf-8")
          req = urllib.request.Request(
              "https://api.resend.com/emails",
              data=raw,
              method="POST",
              headers={
                  "Authorization": f"Bearer {os.environ['RESEND_API_KEY']}",
                  "Content-Type": "application/json",
              },
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              body = resp.read().decode("utf-8", errors="replace")
              print(body)
          PY
