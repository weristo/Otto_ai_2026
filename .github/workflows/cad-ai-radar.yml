name: CAD AI SaaS Radar

on:
  workflow_dispatch:
  schedule:
    # Every hour at minute 00 (Berlin local time is always :00 as well).
    - cron: "0 * * * *"

concurrency:
  group: cad-ai-radar
  cancel-in-progress: false

jobs:
  scan-and-email:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      REPORT_TO: ${{ secrets.CAD_REPORT_TO }}
      REPORT_FROM: ${{ secrets.CAD_REPORT_FROM }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      TZ: Europe/Berlin
      PYTHONUTF8: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate required secrets
        shell: bash
        run: |
          [ -n "${RESEND_API_KEY}" ] || { echo "Missing secret: RESEND_API_KEY"; exit 1; }
          [ -n "${REPORT_TO}" ] || { echo "Missing secret: CAD_REPORT_TO"; exit 1; }
          [ -n "${REPORT_FROM}" ] || { echo "Missing secret: CAD_REPORT_FROM"; exit 1; }
          echo "::add-mask::${RESEND_API_KEY}"

      - name: Build research report
        id: build_report
        continue-on-error: true
        shell: bash
        run: |
          python scripts/cad_ai_radar.py --output cad_report_payload.json --limit 20 --per-source-limit 6
          python - <<'PY'
          import json
          with open("cad_report_payload.json", "r", encoding="utf-8") as f:
          payload = json.load(f)
          print("REPORT_META:", json.dumps(payload.get("meta", {}), ensure_ascii=False))
          PY

      - name: Build fallback error payload
        if: ${{ steps.build_report.outcome == 'failure' }}
        shell: bash
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          now = dt.datetime.now().strftime("%Y-%m-%d %H:%M")
          text = (
              "CAD AI SaaS Radar - HIBA\n"
              f"Futás ideje: {now} (Europe/Berlin)\n"
              "A kutatási folyamat hibára futott, ezért automatikus hibariportot kapsz.\n"
              "A részletek a GitHub Actions logban vannak, de itt a jelzés emailben is megérkezett."
          )
          html = (
              f"<h2>CAD AI SaaS Radar - HIBA</h2>"
              f"<p><b>Futás ideje:</b> {now} (Europe/Berlin)</p>"
              "<p>A kutatási folyamat hibára futott, ezért ez egy automatikus hibariport.</p>"
              "<p>A részletek a GitHub Actions logban vannak, de a jelzés emailben is megérkezett.</p>"
          )
          payload = {
              "subject": f"[HIBA] CAD AI SaaS Radar ({now})",
              "html": html,
              "text": text,
              "meta": {"failed_requests": -1, "reason": "build_report_step_failed"},
          }
          with open("cad_report_payload.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
          print("Fallback payload generated.")
          PY

      - name: Upload report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: cad-report-payload
          path: cad_report_payload.json
          if-no-files-found: error

      - name: Send email via Resend
        if: ${{ always() }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          with open("cad_report_payload.json", "r", encoding="utf-8") as f:
              payload = json.load(f)

          data = {
              "from": os.environ["REPORT_FROM"],
              "to": [os.environ["REPORT_TO"]],
              "subject": payload["subject"],
              "html": payload["html"],
              "text": payload.get("text", ""),
          }
          raw = json.dumps(data).encode("utf-8")
          req = urllib.request.Request(
              "https://api.resend.com/emails",
              data=raw,
              method="POST",
              headers={
                  "Authorization": f"Bearer {os.environ['RESEND_API_KEY']}",
                  "Content-Type": "application/json",
              },
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              body = resp.read().decode("utf-8", errors="replace")
              print(body)
          PY
